name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to (re-)release, e.g. v0.1.0'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install mcpb CLI
        run: npm install -g @anthropic-ai/mcpb

      - name: Cross-compile Go proxy (all 4 platforms)
        run: |
          set -e
          for proxy_dir in plugins/*/proxy; do
            (cd "$proxy_dir" && bash build.sh)
          done

      - name: Build .mcpb Desktop Extensions
        run: |
          set -e
          # Strip the leading 'v' so .mcpb manifests use a clean semver.
          export VERSION="${GITHUB_REF_NAME#v}"
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            export VERSION="${{ github.event.inputs.tag }}"
            export VERSION="${VERSION#v}"
          fi
          for mcpb_dir in plugins/*/mcpb; do
            (cd "$mcpb_dir" && bash build.sh)
          done

      - name: Build plugin .zip (for Claude Desktop "Upload local plugin")
        run: |
          set -e
          for plugin_dir in plugins/*/; do
            name="$(basename "$plugin_dir")"
            out="$plugin_dir/dist/$name.zip"
            mkdir -p "$plugin_dir/dist"
            rm -f "$out"
            # Zip just the plugin contents users need at runtime — exclude
            # source (proxy/), build artifacts (mcpb/), and our own dist/.
            (cd plugins && zip -r "$name/dist/$name.zip" "$name" \
              -x "$name/proxy/*" "$name/mcpb/*" "$name/dist/*")
            ls -lh "$out"
          done

      - name: Create GitHub Release with all artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            plugins/*/mcpb/dist/*.mcpb
            plugins/*/dist/*.zip
